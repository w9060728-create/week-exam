<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技術分享評核系統 - DIAGBOX 與 Stellantis 技術測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #e2e8f0;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .correct-ans { 
            background-color: #ecfdf5 !important; 
            border-color: #10b981 !important; 
            color: #047857 !important; 
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.1) !important;
            transform: scale(1.01);
        }
        .wrong-ans { 
            background-color: #fef2f2 !important; 
            border-color: #ef4444 !important; 
            color: #b91c1c !important; 
        }
        .disabled-btn { pointer-events: none; opacity: 0.7; }
        .blink-red { animation: blinker 1s linear infinite; color: #ef4444; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 text-slate-800 flex items-center justify-center min-h-screen p-4 selection:bg-blue-200">

    <!-- 🌟 終極穩定傳輸機制：隱藏 iframe 與實體 Form (防 50 人同時交卷被擋) -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
    <form id="google-form" action="https://docs.google.com/forms/d/e/您新表單的專屬ID/formResponse" method="POST" target="hidden_iframe" style="display:none;">
        <input type="text" name="entry.1111111" id="gf-dealer">
        <input type="text" name="entry.2222222" id="gf-name">
        <input type="text" name="entry.3333333" id="gf-score">
        <input type="text" name="entry.4444444" id="gf-details">
    </form>

    <div id="login-screen" class="glass-card p-10 rounded-3xl w-full max-w-md transition-all duration-500">
        <div class="text-center mb-8">
            <span class="inline-block p-3 rounded-2xl bg-blue-50 mb-3 shadow-inner">
                <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </span>
            <h1 class="text-3xl font-extrabold text-gradient bg-gradient-to-r from-blue-700 to-cyan-600 tracking-tight">技術評核系統</h1>
            <p class="text-sm text-slate-500 mt-2 font-medium">Stellantis 技術分享測驗</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">經銷商名稱</label>
                <input type="text" id="dealer-input" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 bg-white/50 shadow-sm transition-all text-slate-700 outline-none font-medium" placeholder="例如：星聯板橋">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">技師姓名</label>
                <input type="text" id="name-input" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 bg-white/50 shadow-sm transition-all text-slate-700 outline-none font-medium" placeholder="請輸入本名">
            </div>

            <button onclick="startExam()" class="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-700 hover:to-blue-900 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 text-lg tracking-wide mt-4">
                開始進入評核
            </button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden glass-card p-8 md:p-10 rounded-3xl w-full max-w-3xl relative transition-all duration-500">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div class="bg-blue-50 px-4 py-2 rounded-lg border border-blue-100 shadow-sm">
                <span class="text-sm font-extrabold text-blue-700" id="progress-text">第 1 / 25 題</span>
            </div>
            
            <div class="flex gap-3">
                <div class="flex items-center gap-2 bg-red-50 px-4 py-2 rounded-lg border border-red-100 shadow-sm">
                    <span class="text-sm font-bold text-red-600" id="q-timer-display">⏳ 本題: 02:00</span>
                </div>
                <div class="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-lg border border-slate-200 shadow-sm">
                    <span class="text-sm font-bold text-slate-700" id="timer-display">⏱️ 總時: 30:00</span>
                </div>
            </div>
        </div>
        
        <div class="w-full bg-slate-100 rounded-full h-2.5 mb-8 shadow-inner overflow-hidden">
            <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-cyan-400 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 4%"></div>
        </div>

        <h2 id="question-text" class="text-xl md:text-2xl font-bold mb-8 leading-relaxed text-slate-800">題目載入中...</h2>
        
        <div id="options-container" class="space-y-4 mb-8"></div>

        <div id="feedback-box" class="hidden p-5 rounded-xl mb-6 font-bold text-center text-lg shadow-sm border"></div>

        <button id="next-btn" onclick="nextQuestion()" class="hidden w-full bg-gradient-to-r from-slate-700 to-slate-900 hover:from-slate-800 hover:to-black text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 text-lg tracking-wide">
            前往下一題 ➔
        </button>
    </div>

    <div id="result-screen" class="hidden glass-card p-10 rounded-3xl w-full max-w-md text-center transition-all duration-500">
        <div class="inline-block p-4 rounded-full bg-green-50 mb-4 shadow-inner">
            <span class="text-5xl">🏆</span>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-800 mb-2">評核完成</h2>
        <p class="text-slate-500 font-medium mb-6">感謝您的參與，以下是您的測驗結果</p>
        
        <div class="bg-gradient-to-br from-blue-50 to-cyan-50 p-6 rounded-2xl border border-blue-100 mb-8 shadow-inner">
            <div class="text-sm text-blue-600 font-bold mb-1">總得分</div>
            <div id="final-score" class="text-7xl font-black text-gradient bg-gradient-to-r from-blue-600 to-cyan-600"></div>
        </div>

        <div class="bg-white p-5 rounded-xl border border-slate-100 text-left text-sm text-slate-600 font-medium leading-relaxed shadow-sm space-y-2">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                <span>經銷商：<span id="res-dealer" class="font-bold text-slate-800"></span></span>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                <span>姓名：<span id="res-name" class="font-bold text-slate-800"></span></span>
            </div>
            <div class="flex items-center gap-2 mt-4 pt-3 border-t border-slate-100">
                <svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                <span class="text-green-600">成績與答題詳情已安全同步至總部</span>
            </div>
        </div>
    </div>

<script>
    // ⚠️ 提醒：這裡要記得換回您真實的 Google Form URL 與 Entry ID！
    const formUrl = "https://docs.google.com/forms/d/e/您新表單的專屬ID/formResponse";
    const entryDealer = "entry.1111111"; 
    const entryName = "entry.2222222";   
    const entryScore = "entry.3333333";  
    const entryDetails = "entry.4444444"; 

    const quizData = [
        { q: "在 DiagBox Record 應用中，若選擇「個性化參數測量」，單次最多可以讀取幾個參數？", a: ["5個", "10個", "15個", "無限制"], c: 1 },
        { q: "關於 DiagBox 診斷儀的「標準參數測量」功能，下列敘述何者正確？", a: ["可以跨電腦同時監控多個單元", "可以讀取個別單元的所有參數", "無法顯示任何參數解釋", "單次最多只能讀取十個參數"], c: 1 },
        { q: "在進行 DiagBox JDD 分析前，若在監控過程中未按下哪個按鈕，將會導致監控數據完全遺失？", a: ["圖表顯示", "故障日誌", "標準參數測量", "清除故障碼"], c: 1 },
        { q: "DiagBox 所產出的 JDD 檔案，需要匯入試算表進行詳細分析時，其原始檔案格式為何？", a: ["PDF", "CSV", "DOCX", "XML"], c: 1 },
        { q: "使用 RECORD 功能時，單次最多可以紀錄幾筆資料？", a: ["1筆", "5筆", "10筆", "無上限"], c: 2 },
        { q: "冷氣系統更換管路元件後，為什麼必須執行抽真空的程序？", a: ["為了測試冷氣壓縮機的最高壓力", "排除空氣以避免高壓異常，並抽離水分防止冰堵與酸化", "僅為了將舊的冷凍油完全吸出", "為了讓新冷媒能產生更高的沸點"], c: 1 },
        { q: "在冷氣管路執行高壓液態循環清洗後，必須強制更換下列哪個零件？", a: ["冷氣壓縮機", "蒸發器", "乾燥瓶 / 乾燥包", "膨脹閥"], c: 2 },
        { q: "冷氣系統清洗完畢並更換乾燥瓶後，建議延長深度抽真空 (Deep Vacuum) 程序的實務時間為多久？", a: ["5到10分鐘", "15到30分鐘", "45到60分鐘", "至少120分鐘"], c: 2 },
        { q: "客戶反映 Giulia 車輛上鎖時方向燈呈現「快閃」狀態，且上鎖提示音不同以往。這通常代表系統偵測到什麼問題？", a: ["偵測到防盜系統本身異常", "偵測到車門狀態異常", "偵測到非法的車內入侵", "車內中控系統被誤觸"], c: 1 },
        { q: "在使用 WiTECH 系統提交診斷報告時，原廠建議建立哪種語言的檔案，以避免後續 L1 升級 L2 時引發客訴風險？", a: ["僅建立英文原文報告", "僅建立中文翻譯報告", "中英文同時建檔", "建立中、英,法三種語言"], c: 2 },
        { q: "在引擎運作參數中，「退點火」(Retard) 的防禦性任務主要目的是什麼？", a: ["為了讓氣缸壓力達到最大峰值以提升馬力", "降低排氣溫度並改善油耗", "當偵測到爆震異常或溫度過高時，強行延後點火以保護硬體", "幫助觸媒轉化器快速冷卻"], c: 2 },
        { q: "在 Alfa Romeo 的儀表燈號設計邏輯中，「黃色」燈號代表什麼等級的訊息？", a: ["停駛", "警戒", "作動", "輔助"], c: 1 },
        { q: "承上題，Alfa Romeo 儀表中的「藍色」燈號代表什麼含意？", a: ["停駛", "警戒", "作動", "輔助"], c: 3 },
        { q: "依據原廠規範，Alfa Romeo 引擎機油的「最大正常損耗量」標準為多少？", a: ["100 克 / 每千公里", "250 克 / 每千公里", "400 克 / 每千公里", "1000 克 / 每千公里"], c: 2 },
        { q: "車輛螢幕上的電子機油量尺共有 6 格，請問每 1 格對應的機油量約為多少？", a: ["100 毫升", "250 毫升", "400 毫升", "500 毫升"], c: 1 },
        { q: "要獲得最準確的電子機油油位量測結果，必須在引擎溫熱(約90°C)並熄火後，等待多久時間再進行量測？", a: ["馬上量測", "5 分鐘", "30 分鐘", "完全冷車隔夜"], c: 1 },
        { q: "當儀表板亮起「機油劣化更換提醒 (Engine Oil Change Required)」燈號時，車輛絕對不可再超過行駛多少公里，否則將導致保固失效？", a: ["0 公里 (需立即原地拖車)", "500 公里", "1000 公里", "只要定時補機油就無里程限制"], c: 1 },
        { q: "當儀表持續亮起 GPF (汽油微粒過濾器) 系統清潔進行中的燈號時，建議駕駛將車速保持在多少以上以配合系統再生？", a: ["30 km/h", "60 km/h", "100 km/h", "怠速原地靜置"], c: 1 },
        { q: "相較於僅具備縱向控制的 ACC 系統，HAS (高速公路輔助系統) 多結合了哪種控制邏輯？", a: ["橫向控制 (車道置中邏輯)", "懸吊高度控制", "自動變換車道超車", "遠端遙控停車"], c: 0 },
        { q: "當車輛儀表板上的 GPF (汽油微粒過濾器) 燈號與「警告燈」同步亮起時，代表什麼狀況？", a: ["微粒累積達到極限，需連續高速行駛燒結", "系統已發生故障無法自行再生，需回廠檢修", "正常現象，代表目前正在高溫清潔中", "需立即補充柴油/汽油微粒添加劑"], c: 1 }, 
        { q: "將 DiagBox 產出的 JDD 匯入試算表 (CSV) 後，若想快速分析車輛進場前幾天的故障情況，第一步最推薦的操作是什麼？", a: ["針對日期欄位進行排序 (A 到 Z)", "將所有故障碼轉換為圖表", "刪除所有空白的欄位", "重新計算所有參數的平均值"], c: 0 }, 
        { q: "在執行 DiagBox Record 功能時，若車輛處於 IG OFF (點火開關關閉) 的休眠狀態，系統是否能持續進行數據紀錄？", a: ["可以，系統會自動喚醒", "可以，只要不拔除 VCI 接頭即可", "不可以，IG OFF 時無法紀錄", "可以，但僅限紀錄電壓數據"], c: 2 }, 
        { q: "若要開啟並檢視本機內所有儲存的 DiagBox Record 內部詳細紀錄與圖表資料，技師必須在桌面上開啟哪一個專屬應用程式？", a: ["Service Box", "DiagBox MRI", "WiTECH 2.0", "JDD Analyzer"], c: 1 }, 
        { q: "在冷氣系統維修中執行「真空衰減測試」測漏時，標準作法是將系統抽至深真空後，靜置觀察約多長時間以確認壓力錶指針是否回升？", a: ["1 到 3 分鐘", "10 到 15 分鐘", "30 到 45 分鐘", "60 分鐘以上"], c: 1 }, 
        { q: "當儀表出現黃色燈號「Service Adaptive Cruise Control (ACC) System」時，這通常代表系統發生了什麼狀況？", a: ["前方攝影機被大雨或濃霧遮蔽", "前保險桿雷達表面積聚泥沙", "ACC 系統偵測到內部硬體或通訊故障，系統已自動鎖死", "車輛行駛速度低於 30 km/h"], c: 2 } 
    ];

    let state = {
        dealer: "", name: "", currentQ: 0, score: 0,
        logs: [], timer: 1800, interval: null, 
        qTimer: 120, qInterval: null,
        isAnswered: false, inProgress: false 
    };

    let isFormSubmitted = false;

    // 監聽 iframe 載入完成，代表資料已成功安全送達 Google 表單
    document.getElementById('hidden_iframe').onload = function() {
        if(isFormSubmitted) {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");
            document.getElementById("res-dealer").innerText = state.dealer;
            document.getElementById("res-name").innerText = state.name;
            document.getElementById("final-score").innerText = state.score;
        }
    };

    window.addEventListener("beforeunload", function (e) {
        if (state.inProgress) {
            e.preventDefault();
            e.returnValue = "測驗尚未完成，確定要離開嗎？進度將遺失。";
        }
    });

    window.addEventListener("visibilitychange", function() {
        if (document.visibilityState === 'hidden' && state.inProgress) {
            forceSubmit(true); 
        }
    });

    function startExam() {
        const now = new Date();
        const startTime = new Date('2026-07-22T12:30:00+08:00');
        const endTime = new Date('2026-07-22T13:30:00+08:00');

        if (now < startTime) {
            alert("測驗尚未開始！\n開放時間為：7/22 12:30 ~ 13:30");
            return;
        }
        if (now > endTime) {
            alert("測驗已結束！\n開放時間為：7/22 12:30 ~ 13:30");
            return; 
        }

        const d = document.getElementById("dealer-input").value.trim();
        const n = document.getElementById("name-input").value.trim();
        if (!d || !n) return alert("請完整填寫經銷商與姓名！");

        state.dealer = d; 
        state.name = n;
        state.inProgress = true; 

        document.getElementById("login-screen").classList.add("opacity-0", "scale-95");
        setTimeout(() => {
            document.getElementById("login-screen").classList.add("hidden");
            const quiz = document.getElementById("quiz-screen");
            quiz.classList.remove("hidden");
            void quiz.offsetWidth;
            quiz.classList.remove("opacity-0", "scale-95");
            
            startGlobalTimer();
            loadQuestion();
        }, 300);
    }

    function startGlobalTimer() {
        const display = document.getElementById("timer-display");
        state.interval = setInterval(() => {
            state.timer--;
            let m = Math.floor(state.timer / 60).toString().padStart(2, '0');
            let s = (state.timer % 60).toString().padStart(2, '0');
            display.innerText = `⏱️ 總時: ${m}:${s}`;

            if (state.timer <= 300) display.classList.add("blink-red");

            if (state.timer <= 0) {
                alert("總測驗時間到！系統將自動交卷。");
                forceSubmit(false);
            }
        }, 1000);
    }

    function startQuestionTimer() {
        clearInterval(state.qInterval);
        state.qTimer = 120; 
        updateQTimerDisplay();

        state.qInterval = setInterval(() => {
            state.qTimer--;
            updateQTimerDisplay();

            if (state.qTimer <= 0) {
                clearInterval(state.qInterval);
                handleQuestionTimeUp();
            }
        }, 1000);
    }

    function updateQTimerDisplay() {
        let m = Math.floor(state.qTimer / 60).toString().padStart(2, '0');
        let s = (state.qTimer % 60).toString().padStart(2, '0');
        const qDisplay = document.getElementById("q-timer-display");
        qDisplay.innerText = `⏳ 本題: ${m}:${s}`;
        
        if(state.qTimer <= 10 && state.qTimer > 0) {
            qDisplay.parentElement.classList.add("animate-pulse", "bg-red-100", "border-red-300");
        } else {
            qDisplay.parentElement.classList.remove("animate-pulse", "bg-red-100", "border-red-300");
        }
    }

    function handleQuestionTimeUp() {
        if (state.isAnswered) return;
        state.isAnswered = true;

        const qData = quizData[state.currentQ];
        const correctIndex = qData.c;
        const allBtns = document.querySelectorAll(".option-btn");
        const fbBox = document.getElementById("feedback-box");

        allBtns.forEach(b => b.classList.add("disabled-btn", "opacity-50"));
        allBtns[correctIndex].classList.remove("opacity-50");
        allBtns[correctIndex].classList.add("correct-ans");

        let logText = `Q${state.currentQ + 1}:[未答] 逾時未作答 / 正解:${qData.a[correctIndex]}`;
        fbBox.innerText = `⏳ 測驗逾時！本題未得分。正確答案應為：「${qData.a[correctIndex]}」`;
        fbBox.className = "p-5 rounded-xl mb-6 font-bold text-center text-lg shadow-sm border border-orange-200 bg-orange-50 text-orange-700 block";

        state.logs.push(logText);
        document.getElementById("next-btn").classList.remove("hidden");
    }

    function loadQuestion() {
        state.isAnswered = false;
        document.getElementById("next-btn").classList.add("hidden");
        document.getElementById("feedback-box").classList.add("hidden");
        
        // 💡 只清除單題計時器，確保總計時器 (state.interval) 不會被中斷
        clearInterval(state.qInterval);
        
        const qData = quizData[state.currentQ];
        document.getElementById("progress-text").innerText = `第 ${state.currentQ + 1} / ${quizData.length} 題`;
        document.getElementById("progress-bar").style.width = `${((state.currentQ + 1) / quizData.length) * 100}%`;
        document.getElementById("question-text").innerText = `${state.currentQ + 1}. ${qData.q}`;

        const opts = document.getElementById("options-container");
        opts.innerHTML = "";
        
        qData.a.forEach((text, idx) => {
            const btn = document.createElement("button");
            btn.className = "w-full text-left px-6 py-4 border-2 rounded-xl font-medium transition-all duration-200 hover:bg-blue-50/50 hover:border-blue-300 bg-white border-slate-200 shadow-sm hover:shadow option-btn text-slate-700";
            btn.innerText = text;
            btn.onclick = () => selectAnswer(idx, btn);
            opts.appendChild(btn);
        });

        startQuestionTimer();
    }

    function selectAnswer(selectedIndex, btnElement) {
        if (state.isAnswered) return;
        state.isAnswered = true;
        
        clearInterval(state.qInterval); 

        const qData = quizData[state.currentQ];
        const correctIndex = qData.c;
        const allBtns = document.querySelectorAll(".option-btn");
        const fbBox = document.getElementById("feedback-box");

        allBtns.forEach(b => b.classList.add("disabled-btn", "opacity-50"));

        let logText = "";
        if (selectedIndex === correctIndex) {
            btnElement.classList.remove("opacity-50");
            btnElement.classList.add("correct-ans");
            state.score += 4; 
            logText = `Q${state.currentQ + 1}:[對] 技師選:${qData.a[selectedIndex]}`;
            fbBox.innerText = "✓ 答對了！";
            fbBox.className = "p-5 rounded-xl mb-6 font-bold text-center text-lg shadow-sm border border-green-200 bg-green-50 text-green-700 block";
        } else {
            btnElement.classList.remove("opacity-50");
            btnElement.classList.add("wrong-ans");
            allBtns[correctIndex].classList.remove("opacity-50");
            allBtns[correctIndex].classList.add("correct-ans");
            logText = `Q${state.currentQ + 1}:[錯] 技師選:${qData.a[selectedIndex]} / 正解:${qData.a[correctIndex]}`;
            fbBox.innerText = `✗ 答錯了！正確答案應為：「${qData.a[correctIndex]}」`;
            fbBox.className = "p-5 rounded-xl mb-6 font-bold text-center text-lg shadow-sm border border-red-200 bg-red-50 text-red-700 block";
        }

        state.logs.push(logText);
        document.getElementById("next-btn").classList.remove("hidden");
    }

    function nextQuestion() {
        state.currentQ++;
        if (state.currentQ < quizData.length) {
            loadQuestion();
        } else {
            forceSubmit(false); 
        }
    }
