    // ============================================================

    const entryDealer = "entry.721790582";   // 經銷商

    const entryDetails = "entry.1557754387"; // 答題詳情

        { q: "客戶反映 Giulia 車輛上鎖時方向燈「快閃」且提示音異常，通常代表？", a: ["電池電量過低", "車門/引擎蓋未能確實關閉", "非法入侵警報", "鑰匙沒電"], c: 1 },
        { q: "使用 Witech 系統建檔診斷報告時，原廠建議使用何種語言？", a: ["僅法文", "僅中文", "中英文同時建檔", "不需要文字，截圖即可"], c: 2 },
        { q: "若 Witech 診斷僅建立中文報告，將案件升級至 L2 支援時容易發生什麼狀況？", a: ["系統自動翻譯", "原廠工程師無法判讀，需請客戶回廠補件，增加客訴風險", "檔案會被強制退回 L0", "無任何影響"], c: 1 },
        { q: "相較於 Witech，DiagBox 產出的診斷資料會自動建立幾種語言？", a: ["1種", "2種", "3種", "5種"], c: 2 },
        { q: "Witech 診斷系統中，若要查看故障發生當下的環境數值，可檢視什麼資料？", a: ["凍結資料/快照/事件資料", "車主手冊", "TSB 通報", "服務保養紀錄"], c: 0 },
        { q: "在進行 Witech 診斷時，若遇到 L1 無法解決的問題，應向哪一級別尋求支援？", a: ["L0", "L2", "L3", "L4"], c: 1 },
        { q: "Alfa 車系正常的上鎖作動，方向燈的反應應為？", a: ["常亮 5 秒", "快閃 3 次", "閃爍 1 次且伴隨正常提示音", "完全不亮"], c: 2 },
        { q: "車輛進入休眠前，若在執行診斷紀錄，是否必須將「所有車門關閉」？", a: ["是，維持休眠狀態的標準規範", "否，開著門不會影響休眠", "僅需關閉駕駛座車門", "視電瓶電壓而定"], c: 0 }
    ];

    // 系統變數狀態
    let state = {
        dealer: "", name: "", currentQ: 0, score: 0,
        logs: [], timer: 1800, interval: null, 
        qTimer: 120, qInterval: null,
        isAnswered: false, inProgress: false,
        selectedQuestions: [] // 存放抽出來考的題目
    };

    // ★ 洗牌演算法 (Fisher-Yates) ★
    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    // 攔截網頁關閉
    window.addEventListener("beforeunload", function (e) {
        if (state.inProgress) {
            e.preventDefault();
            e.returnValue = "測驗尚未完成，確定要離開嗎？進度將遺失。";
        }
    });

    window.addEventListener("visibilitychange", function() {
        if (document.visibilityState === 'hidden' && state.inProgress) {
            forceSubmit(true); 
        }
    });

    function startExam() {
        if (ENABLE_EXAM_WINDOW) {
            const now = new Date();
            if (now < EXAM_START) {
                alert("測驗尚未開始！\n開放時間為：" + EXAM_START.toLocaleString('zh-TW') + " ~ " + EXAM_END.toLocaleString('zh-TW'));
                return;
            }
            if (now > EXAM_END) {
                alert("測驗已結束！\n開放時間為：" + EXAM_START.toLocaleString('zh-TW') + " ~ " + EXAM_END.toLocaleString('zh-TW'));
                return; 
            }
        }

        const d = document.getElementById("dealer-input").value.trim();
        const n = document.getElementById("name-input").value.trim();
        if (!d || !n) return alert("請完整填寫經銷商與姓名！");

        state.dealer = d; 
        state.name = n;
        state.inProgress = true; 

        // ==========================================
        // ★ 核心抽題與洗牌邏輯 ★
        // 1. 設定總題數為 20 題
        // ==========================================
        const TOTAL_QUESTIONS_TO_ASK = 20; 
        
        // 2. 先從 50 題題庫中，隨機抽出 20 題
        let randomQuestions = shuffleArray(allQuizData).slice(0, TOTAL_QUESTIONS_TO_ASK);
        
        // 3. 把抽出來的每一題，選項 A, B, C, D 再次打亂
        state.selectedQuestions = randomQuestions.map(q => {
            let originalCorrectText = q.a[q.c]; 
            let shuffledOptions = shuffleArray(q.a); 
            let newCorrectIndex = shuffledOptions.indexOf(originalCorrectText); 
            
            return {
                q: q.q,
                a: shuffledOptions,
                c: newCorrectIndex,
                ...(q.img ? { img: q.img } : {})
            };
        });
        // ==========================================
        
        document.getElementById("login-screen").classList.add("opacity-0", "scale-95");
        setTimeout(() => {
            document.getElementById("login-screen").classList.add("hidden");
            const quiz = document.getElementById("quiz-screen");
            quiz.classList.remove("hidden");
            void quiz.offsetWidth;
            quiz.classList.remove("opacity-0", "scale-95");

            if (!ENABLE_TIMERS) {
                document.getElementById("timers-wrapper").classList.add("hidden");
            } else {
                startGlobalTimer();
            }
            loadQuestion();
        }, 300);
    }

    function startGlobalTimer() {
        const display = document.getElementById("timer-display");
        state.interval = setInterval(() => {
            state.timer--;
            let m = Math.floor(state.timer / 60).toString().padStart(2, '0');
            let s = (state.timer % 60).toString().padStart(2, '0');
            display.innerText = `⏱️ 總時: ${m}:${s}`;

            if (state.timer <= 300) display.classList.add("blink-red");

            if (state.timer <= 0) {
                alert("總測驗時間到！系統將自動交卷。");
                forceSubmit(false);
            }
        }, 1000);
    }

    function startQuestionTimer() {
        if (!ENABLE_TIMERS) return;
        clearInterval(state.qInterval);
        state.qTimer = 120; 
        updateQTimerDisplay();

        state.qInterval = setInterval(() => {
            state.qTimer--;
            updateQTimerDisplay();

            if (state.qTimer <= 0) {
                clearInterval(state.qInterval);
                handleQuestionTimeUp();
            }
        }, 1000);
    }

    function updateQTimerDisplay() {
        let m = Math.floor(state.qTimer / 60).toString().padStart(2, '0');
        let s = (state.qTimer % 60).toString().padStart(2, '0');
        const qDisplay = document.getElementById("q-timer-display");
        qDisplay.innerText = `⏳ 本題: ${m}:${s}`;
        
        if(state.qTimer <= 10 && state.qTimer > 0) {
            qDisplay.parentElement.classList.add("animate-pulse", "bg-red-100", "border-red-300");
        } else {
            qDisplay.parentElement.classList.remove("animate-pulse", "bg-red-100", "border-red-300");
        }
    }

    function handleQuestionTimeUp() {
        if (state.isAnswered) return;
        state.isAnswered = true;

        const qData = state.selectedQuestions[state.currentQ];
        const correctIndex = qData.c;
        const allBtns = document.querySelectorAll(".option-btn");
        const fbBox = document.getElementById("feedback-box");

        allBtns.forEach(b => b.classList.add("disabled-btn", "opacity-50"));
        allBtns[correctIndex].classList.remove("opacity-50");
        allBtns[correctIndex].classList.add("correct-ans");

        let logText = `Q${state.currentQ + 1}:[未答] 逾時未作答 / 正解:${qData.a[correctIndex]}`;
        fbBox.innerText = `⏳ 測驗逾時！本題未得分。正確答案應為：「${qData.a[correctIndex]}」`;
        fbBox.className = "p-5 rounded-xl mb-6 font-bold text-center text-lg shadow-sm border border-orange-200 bg-orange-50 text-orange-700 block";

        state.logs.push(logText);
        document.getElementById("next-btn").classList.remove("hidden");
    }

    function loadQuestion() {
        state.isAnswered = false;
        document.getElementById("next-btn").classList.add("hidden");
        document.getElementById("feedback-box").classList.add("hidden");
        
        clearInterval(state.qInterval);
        
        const qData = state.selectedQuestions[state.currentQ];
        const totalQ = state.selectedQuestions.length;
        
        document.getElementById("progress-text").innerText = `第 ${state.currentQ + 1} / ${totalQ} 題`;
        document.getElementById("progress-bar").style.width = `${((state.currentQ + 1) / totalQ) * 100}%`;
        document.getElementById("question-text").innerText = `${state.currentQ + 1}. ${qData.q}`;

        const imgContainer = document.getElementById("question-image-container");
        const imgElement = document.getElementById("question-image");
        if (qData.img) {
            imgElement.src = qData.img;
            imgContainer.classList.remove("hidden");
        } else {
            imgElement.src = "";
            imgContainer.classList.add("hidden");
        }

        const opts = document.getElementById("options-container");
        opts.innerHTML = "";
        
        qData.a.forEach((text, idx) => {
            const btn = document.createElement("button");
            btn.className = "w-full text-left px-6 py-4 border-2 rounded-xl font-medium transition-all duration-200 hover:bg-blue-50/50 hover:border-blue-300 bg-white border-slate-200 shadow-sm hover:shadow option-btn text-slate-700";
            btn.innerText = text;
            btn.onclick = () => selectAnswer(idx, btn);
            opts.appendChild(btn);
        });

        startQuestionTimer();
    }

    function selectAnswer(selectedIndex, btnElement) {
        if (state.isAnswered) return;
        state.isAnswered = true;
        
        clearInterval(state.qInterval); 

        const qData = state.selectedQuestions[state.currentQ];
        const correctIndex = qData.c;
        const allBtns = document.querySelectorAll(".option-btn");
        const fbBox = document.getElementById("feedback-box");

        allBtns.forEach(b => b.classList.add("disabled-btn", "opacity-50"));

        let logText = "";
        if (selectedIndex === correctIndex) {
            btnElement.classList.remove("opacity-50");
            btnElement.classList.add("correct-ans");
            
            const pointsPerQ = 100 / state.selectedQuestions.length; 
            state.score += pointsPerQ; 
            
            logText = `Q${state.currentQ + 1}:[對] 技師選:${qData.a[selectedIndex]}`;
            fbBox.innerText = "✓ 答對了！";
            fbBox.className = "p-5 rounded-xl mb-6 font-bold text-center text-lg shadow-sm border border-green-200 bg-green-50 text-green-700 block";
        } else {
            btnElement.classList.remove("opacity-50");
            btnElement.classList.add("wrong-ans");
            allBtns[correctIndex].classList.remove("opacity-50");
            allBtns[correctIndex].classList.add("correct-ans");
            logText = `Q${state.currentQ + 1}:[錯] 技師選:${qData.a[selectedIndex]} / 正解:${qData.a[correctIndex]}`;
            fbBox.innerText = `✗ 答錯了！正確答案應為：「${qData.a[correctIndex]}」`;
            fbBox.className = "p-5 rounded-xl mb-6 font-bold text-center text-lg shadow-sm border border-red-200 bg-red-50 text-red-700 block";
        }

        state.logs.push(logText);
        document.getElementById("next-btn").classList.remove("hidden");
    }

    function nextQuestion() {
        state.currentQ++;
        if (state.currentQ < state.selectedQuestions.length) {
            loadQuestion();
        } else {
            forceSubmit(false); 
        }
    }

    function forceSubmit(isAborted) {
        if (!state.inProgress) return; 
        state.inProgress = false; 
        clearInterval(state.interval); 
        clearInterval(state.qInterval); 

        let finalLogs = [...state.logs];

        if (isAborted) {
            finalLogs.push("【嚴重警告：技師於此題強行關閉網頁或返回上一頁，疑似作弊】");
        } else {
            while (state.currentQ < state.selectedQuestions.length) {
                if(!state.isAnswered){
                     const qData = state.selectedQuestions[state.currentQ];
                     finalLogs.push(`Q${state.currentQ + 1}:[未答] 未作答 / 正解:${qData.a[qData.c]}`);
                }
                state.currentQ++;
                state.isAnswered = false;
            }
        }

        const params = new URLSearchParams();
        params.append(entryDealer, state.dealer);
        params.append(entryName, state.name);
        params.append(entryScore, Math.round(state.score).toString());
        params.append(entryDetails, finalLogs.join(" | "));

        fetch(formUrl, {
            method: "POST", mode: "no-cors",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: params.toString(),
            keepalive: true 
        }).catch(err => console.log(err));

        if (!isAborted) {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");
            document.getElementById("res-dealer").innerText = state.dealer;
            document.getElementById("res-name").innerText = state.name;
            document.getElementById("final-score").innerText = Math.round(state.score);
        }
    }
</script>
